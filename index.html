
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラーリーディング｜心の色を読み解く</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #fdf8f2;
    --bg2:       #fef4eb;
    --surface:   #fffcf8;
    --rose:      #c0745a;
    --rose-mid:  #d9967e;
    --rose-pale: #f5e4dc;
    --text:      #3d2b1f;
    --text-mid:  #7a5c4a;
    --text-muted:#b09080;
    --border:    rgba(192,116,90,0.18);
    --now-col:   #6a9e82;
    --stress-col:#8a78b8;
    --wish-col:  #c0745a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ────── INTRO ────── */
  #intro {
    background: radial-gradient(ellipse at 50% 20%, #fdeee4 0%, #fdf8f2 65%);
    text-align: center;
    padding: 3rem 2rem;
    gap: 1.8rem;
  }

  .intro-petal {
    font-size: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 300;
    font-style: italic;
    color: var(--rose);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .intro-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.25em;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  .intro-divider {
    width: 40px;
    height: 1px;
    background: var(--rose-mid);
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  .intro-desc {
    max-width: 380px;
    font-size: 0.88rem;
    line-height: 2.2;
    color: var(--text-mid);
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
  }

  .btn-start {
    padding: 0.9rem 2.8rem;
    background: var(--rose);
    border: none;
    color: #fff;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(192,116,90,0.3);
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }
  .btn-start:hover { background: var(--rose-mid); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(192,116,90,0.35); }

  /* ────── STEP 1 ────── */
  #step1 {
    padding: 2.5rem 1rem 3rem;
    gap: 1.8rem;
    background: var(--bg);
  }

  .step-header { text-align: center; }

  .step-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: var(--rose);
    text-transform: uppercase;
  }

  .step-title {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 400;
    margin-top: 0.6rem;
    color: var(--text);
    line-height: 1.7;
  }

  .step-desc {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    line-height: 2;
  }

  .color-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 580px;
    padding: 1.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 4px 24px rgba(192,116,90,0.07);
  }

  .color-swatch {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    cursor: grab;
    border: 3px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .color-swatch:hover { transform: scale(1.12); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  .color-swatch.dragging { opacity: 0.45; cursor: grabbing; }
  .color-swatch.drag-over { border-color: var(--rose); transform: scale(1.1); }
  .color-swatch.selected-tap { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-pale); }

  .color-swatch .num {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* sorted preview */
  .sorted-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 580px;
  }
  .sorted-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .sorted-mini {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid transparent;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    transition: all 0.3s;
  }
  .slot-num { font-size: 0.58rem; color: var(--text-muted); }
  .sorted-slot.hl-wish .sorted-mini   { border-color: var(--wish-col);   box-shadow: 0 0 8px rgba(192,116,90,0.4); }
  .sorted-slot.hl-now .sorted-mini    { border-color: var(--now-col);    box-shadow: 0 0 8px rgba(106,158,130,0.4); }
  .sorted-slot.hl-stress .sorted-mini { border-color: var(--stress-col); box-shadow: 0 0 8px rgba(138,120,184,0.4); }

  /* legend */
  .legend {
    display: flex;
    gap: 1.2rem;
    font-size: 0.68rem;
    color: var(--text-muted);
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .btn-result {
    padding: 0.9rem 2.5rem;
    background: #a8a8a8;
    border: none;
    color: #fff;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(192,116,90,0.3);
  }
  .btn-result:hover { background: #888888; transform: translateY(-2px); }
  .btn-result:disabled { background: #d8c8c0; box-shadow: none; cursor: not-allowed; transform: none; }

  /* ────── RESULT ────── */
  #result {
    padding: 3rem 1.5rem 4rem;
    gap: 2rem;
    background: radial-gradient(ellipse at 50% 0%, #fdeee4 0%, #fdf8f2 55%);
  }

  .result-header { text-align: center; }

  .result-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--rose);
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    letter-spacing: 0.08em;
    margin-top: 0.4rem;
  }

  .result-grid {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    max-width: 540px;
    width: 100%;
  }

  .result-card {
    border-radius: 18px;
    padding: 1.6rem 1.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 2px 16px rgba(192,116,90,0.07);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .result-card.visible { opacity: 1; transform: translateY(0); }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .card-now::before    { background: var(--now-col); }
  .card-stress::before { background: var(--stress-col); }
  .card-wish::before   { background: var(--wish-col); }

  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 0.9rem;
    font-family: 'Cormorant Garamond', serif;
  }
  .card-now .card-label    { color: var(--now-col); }
  .card-stress .card-label { color: var(--stress-col); }
  .card-wish .card-label   { color: var(--wish-col); }

  .card-message {
    font-size: 0.9rem;
    line-height: 2.1;
    color: var(--text-mid);
    font-weight: 300;
  }

  .loading-text {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    animation: pulse 1.5s ease infinite;
    padding: 2rem;
  }

  /* ── POWER SELECTION ── */
  .power-section {
    max-width: 540px;
    width: 100%;
    text-align: center;
  }
  .power-question {
    font-size: 0.85rem;
    color: var(--text-mid);
    letter-spacing: 0.12em;
    margin-bottom: 1.2rem;
    line-height: 2;
  }
  .power-choices {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .power-btn {
    padding: 1rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--text-mid);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .power-btn:hover {
    background: var(--rose-pale);
    border-color: var(--rose-mid);
    color: var(--rose);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(192,116,90,0.15);
  }

  /* ── AFFIRMATION ── */
  .affirmation-card {
    max-width: 540px;
    width: 100%;
    text-align: center;
    padding: 3rem 2rem;
    background: linear-gradient(135deg, #fdeee4 0%, #fdf4f0 100%);
    border-radius: 24px;
    border: 1px solid var(--rose-pale);
    opacity: 1;
    transform: none;
  }
  .affirmation-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--rose);
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    margin-bottom: 1.2rem;
  }
  .affirmation-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-style: italic;
    color: var(--text);
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .affirmation-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 1.2rem;
    line-height: 2;
  }

  .cheer-card {
    text-align: center;
    padding: 1.8rem;
    background: linear-gradient(135deg, #fdeee4 0%, #fdf4f0 100%);
    border: 1px solid var(--rose-pale);
    border-radius: 18px;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .cheer-card.visible { opacity: 1; transform: translateY(0); }
  .cheer-message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-style: italic;
    color: var(--rose);
    line-height: 1.8;
    margin-bottom: 0.6rem;
  }
  .cheer-from {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }


  /* ── SHARE CARD ── */
  .share-btn {
    padding: 0.75rem 2rem;
    background: #b0b0b0;
    border: none;
    color: #fff;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    margin-top: 1rem;
  }
  .share-btn:hover { background: #909090; transform: translateY(-2px); }

  #shareCanvas { display: none; }
  .btn-retry {
    padding: 0.75rem 2rem;
    background: transparent;
    border: 1px solid var(--rose-mid);
    color: var(--rose);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.3s;
  }
  .btn-retry:hover { background: var(--rose-pale); }

  .divider {
    width: 40px; height: 1px;
    background: var(--rose-mid);
    opacity: 0.4;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { opacity: 0.35; } 50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="intro-petal">🌸</div>
  <h1 class="intro-title">Color Reading</h1>
  <p class="intro-sub">色から心を読み解く</p>
  <div class="intro-divider"></div>
  <p class="intro-desc">
    12色を直感で並べてください。<br>
    考えすぎずに、心が動くままに。<br>
    あなたが選ぶ順番の中に、<br>
    今の心模様が映し出されます。
  </p>
  <button class="btn-start" onclick="showStep1()">はじめる</button>
</div>

<!-- STEP 1 -->
<div class="screen" id="step1">
  <div class="step-header">
    <div class="step-label">Step 1</div>
    <div class="step-title">好きな順番に並べてください</div>
    <div class="step-desc">直感で。左から「惹かれる色」の順に。</div>
  </div>

  <div class="color-palette" id="palette"></div>

  <div class="sorted-row" id="sortedRow"></div>

  <p style="font-size:0.85rem; color:var(--text-mid); letter-spacing:0.08em; text-align:center; line-height:2;">
    さあ、あなたの今の心模様を見てみましょう
  </p>

  <button class="btn-result" id="btnResult" onclick="showResult()">心模様を読み解く</button>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-header">
    <div class="result-eyebrow">Color Reading</div>
    <div class="result-title">あなたの心模様</div>
  </div>

  <div class="result-grid" id="resultGrid"></div>

</div>

<script>

  { name:'レッド',          hex:'#E82020', direction:'外向・自律' },
  { name:'レッドオレンジ',  hex:'#E85A10', direction:'外向・自律' },
  { name:'オレンジ',        hex:'#F09000', direction:'外向・他律' },
  { name:'イエロー',        hex:'#F5D800', direction:'外向・他律' },
  { name:'イエローグリーン',hex:'#96D400', direction:'中立（どちらへも向かい中立へ戻る）' },
  { name:'グリーン',        hex:'#18A838', direction:'中立（どちらへも向かい中立へ戻る）' },
  { name:'ブルーグリーン',  hex:'#009E7A', direction:'内向・自律' },
  { name:'ターコイズ',      hex:'#00B4C8', direction:'内向・自律' },
  { name:'ブルー',          hex:'#1878C8', direction:'内向・他律' },
  { name:'インディゴ',      hex:'#2830A0', direction:'内向・他律' },

const KEYWORDS = {
  'レッド': {

    theme:'自由力・変化・陽気・好奇心'
  },

  },
  'イエローグリーン': {

    negative:['曖昧','頑固','鈍重','意固地','個人主義','自己過信','うぬぼれ','固執','批判的','虚栄心','自慢','冷たい','見下す'],

  },
  'ターコイズ': {

function getTwoColorReading(c1, c2) {

let order = [...COLORS];
let dragSrc = null;

function showStep1() {
  switchScreen('step1');
  order = [...COLORS];
  renderPalette();
  renderSorted();
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderPalette() {
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  order.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'color-swatch';
    div.style.background = c.hex;
    div.title = c.name;
    div.draggable = true;
    div.dataset.idx = i;

    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = i + 1;
    div.appendChild(num);

    div.addEventListener('dragstart', e => {
      dragSrc = i;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (dragSrc === null || dragSrc === i) return;
      [order[dragSrc], order[i]] = [order[i], order[dragSrc]];
      dragSrc = null;
      renderPalette();
      renderSorted();
    });

    // タップで選択→交換
    div.addEventListener('click', () => {
      if (dragSrc === null) {
        dragSrc = i;
        div.classList.add('selected-tap');
      } else {
        if (dragSrc !== i) {
          [order[dragSrc], order[i]] = [order[i], order[dragSrc]];
        }
        dragSrc = null;
        renderPalette();
        renderSorted();
      }
    });

    palette.appendChild(div);
  });
}

function renderSorted() {
  const row = document.getElementById('sortedRow');
  row.innerHTML = '';
  order.forEach((c, i) => {
    const slot = document.createElement('div');
    slot.className = 'sorted-slot';
    if (i === 0 || i === 1) slot.classList.add('hl-wish');
    if (i === 2 || i === 3) slot.classList.add('hl-now');
    if (i === 10 || i === 11) slot.classList.add('hl-stress');

    const circle = document.createElement('div');
    circle.className = 'sorted-mini';
    circle.style.background = c.hex;

    const lbl = document.createElement('span');
    lbl.className = 'slot-num';
    lbl.textContent = i + 1;

    slot.appendChild(circle);
    slot.appendChild(lbl);
    row.appendChild(slot);
  });
}

function showAffirmation(color, cp) {
  const grad = COLOR_GRADIENTS[color.name] || { bg:'linear-gradient(135deg, #fdeee4, #fdf4f0)', text:'#ffffff', accent:'rgba(255,255,255,0.75)' };
  const powerSection = document.getElementById('powerSection');
  const choices = powerSection.querySelector('.power-choices');
  const affArea = document.getElementById('affArea');

  if (!choices || !affArea) { console.error('Elements not found'); return; }
  choices.style.display = 'none';
  affArea.innerHTML = '';

  // アファメーションカード（色だけ・ボタンなし）
  const aff = document.createElement('div');
  aff.style.cssText = 'background:' + grad.bg + '; border-radius:24px; padding:3rem 2rem; text-align:center; margin-bottom:1.2rem;';

  const label = document.createElement('div');
  label.style.cssText = 'font-size:0.65rem; letter-spacing:0.3em; color:' + grad.accent + '; font-family:Cormorant Garamond,serif; margin-bottom:1.2rem;';
  label.textContent = 'AFFIRMATION';
  aff.appendChild(label);

  const txt = document.createElement('div');
  txt.style.cssText = 'font-family:Cormorant Garamond,serif; font-size:clamp(1.4rem,4vw,2rem); font-style:italic; color:' + grad.text + '; line-height:1.8;';
  txt.textContent = cp.affirmation;
  aff.appendChild(txt);

  const sub = document.createElement('div');
  sub.style.cssText = 'font-size:0.72rem; color:' + grad.accent + '; margin-top:1.2rem; line-height:2;';
  sub.innerHTML = '声に出して、心の中で繰り返してみてください🌸<br>あなたはすでに、この力を持っています。';
  aff.appendChild(sub);

  affArea.appendChild(aff);

  // ボタン群（カードの外）
  const btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex; flex-direction:column; gap:0.8rem; width:100%;';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'share-btn';
  saveBtn.style.cssText = 'width:100%;';
  saveBtn.textContent = 'カードを保存する 📥';
  saveBtn.onclick = function() { downloadShareCard(color.name, cp.affirmation); };
  btnWrap.appendChild(saveBtn);

  const backBtn = document.createElement('button');
  backBtn.className = 'btn-retry';
  backBtn.style.cssText = 'width:100%;';
  backBtn.textContent = '他の力も見てみる';
  backBtn.onclick = function() {
    affArea.innerHTML = '';
    choices.style.display = 'flex';
  };
  btnWrap.appendChild(backBtn);

  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn-retry';
  retryBtn.style.cssText = 'width:100%;';
  retryBtn.textContent = 'もう一度試す';
  retryBtn.onclick = function() { showStep1(); };
  btnWrap.appendChild(retryBtn);

  affArea.appendChild(btnWrap);
}

function buildPrompt(wish, now, stress) {
  const kw = (colors, type) => colors.map(c => {
    const k = KEYWORDS[c.name];
    const dir = c.direction;
    if (type === 'wish')   return `${c.name}【${dir}】（${k.positive.slice(0,6).join('・')}）`;
    if (type === 'now')    return `${c.name}【${dir}】（表：${k.positive.slice(0,4).join('・')} ／ 裏：${k.negative.slice(0,3).join('・')}）`;
    if (type === 'stress') return `${c.name}【${dir}】（本来求めているもの：${k.positive.slice(0,4).join('・')} ／ 今の状態：${k.minus.join('・')}）`;
  }).join('、');

  return `あなたは30年のキャリアを持つ色彩心理の専門家です。
以下の原理を深く理解した上で、その人の心模様を言葉にしてください。

【色彩エネルギーの宇宙軸】
色は宇宙から地球の核まで人体を貫く一本の軸としてつながっています：
P（宇宙・松果体）→ I（理解・思考・左脳）→ B（言葉・誠実・喉）→ T（自己の芯・免疫・胸腺）→ BG（自己確立・免疫力）→ G（恩恵・貢献・心臓）→ YG（愛・平和・心臓）→ Y（希望・知性・太陽神経叢）→ O（満足・腹のリズム・生命の波動）→ RO（達成・腹の底力）→ R（前進・足元・血の巡り）→ M（大いなる母・地球の核・すべての生命との共存）

【色彩エネルギーの方向性】
・外向・自律（R・RO）→ 足元から湧く力、腹の底から自らが動く情熱
・外向・他律（O・Y）→ 腹のリズムと知性の輝き、周りと響き合いながら広がる
・内向・自律（BG・T）→ 免疫力・芯の強さ、自分を守る揺るぎない力
・内向・他律（B・I）→ 聴く・語る・考える、頭で理解しようとする誠実さ
・中立（YG・G）→ 心臓から広がる愛と安らぎ、人とのつながり
・大中立・他律（P）→ 宇宙の摂理・直感・全神経とつながる感性
・大中立・自律（M）→ 地球の核・母なる大地の愛、すべての生命と共存するエネルギー

【重要なパターン認識】
以下のパターンを参考に、その人の状況を深く読み解いてください：

パターン1「ノリノリ活動期」
→ 外向性（R・RO・O・Y）が上位に固まる
→ 今まさに外へ向かって動きたい、楽しく何にでも反応できる活動期。難しく考えることより行動が優先

パターン2「悩みの真っ只中」
→ B・Iが現状、外向性が願望、中立（YG・G・BG）が心の奥

パターン4「頑張りすぎて心身が悲鳴」

  const gradColors = parseGradient(grad.bg);
  const grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  gradColors.forEach((c, i) => grd.addColorStop(i / (gradColors.length - 1), c));
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Soft overlay
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Decorative circles
  [400, 280, 160].forEach((r, i) => {
    ctx.beginPath();
    ctx.arc(540, 960, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${0.04 + i * 0.02})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  const textColor = grad.text === '#fff' ? '#ffffff' : '#3d2b1f';
  const subColor = grad.text === '#fff' ? 'rgba(255,255,255,0.75)' : 'rgba(61,43,31,0.65)';

  // Affirmation label (上部)
  ctx.fillStyle = subColor;
  ctx.font = '300 34px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('A F F I R M A T I O N', 540, 280);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(240, 320);
  ctx.lineTo(840, 320);
  ctx.stroke();

  // Main text with word wrap
  ctx.fillStyle = textColor;
  ctx.font = '500 66px Noto Serif JP, sans-serif';
  ctx.textAlign = 'center';

  const chars = affirmationText.split('');
  const lines = [];
  let line = '';
  const maxWidth = 820;
  for (let char of chars) {
    const test = line + char;
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = char;
    } else {
      line = test;
    }
  }
  lines.push(line);

  const lineHeight = 110;
  const totalH = lines.length * lineHeight;
  const startY = 960 - totalH / 2 + 40;
  lines.forEach((l, i) => {
    ctx.fillText(l, 540, startY + i * lineHeight);
  });

  // Dots decoration
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  [-50, 0, 50].forEach(x => {
    ctx.beginPath();
    ctx.arc(540 + x, startY + totalH + 50, 5, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ray より
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'italic 300 52px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('— Ray —', 540, 1550);

  // Bottom divider
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(240, 1620);
  ctx.lineTo(840, 1620);
  ctx.stroke();

  // JCLTA (一番下)
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 60px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('JCLTA', 540, 1710);

  ctx.fillStyle = subColor;
  ctx.font = '300 26px Georgia, serif';
  ctx.fillText('Japan Color Light Therapy Association', 540, 1760);

  // Download
  const link = document.createElement('a');
  link.download = `ray-affirmation-${colorName}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function parseGradient(gradStr) {
  const matches = gradStr.match(/#[0-9a-fA-F]{3,8}/g);
  return matches || ['#fdeee4', '#fdf4f0'];
}

showStep1();
</script>
